<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 2D:4D比 計測ツール</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; text-align: center; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #container { position: relative; width: 100vw; height: 65vh; background: #000; overflow: hidden; }
        /* ビデオ自体は完全に隠す */
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        /* キャンバスを画面中央に完璧にフィットさせる */
        canvas { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; object-fit: contain; }
        #ui { padding: 10px; height: 35vh; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #2c3e50; }
        .result-box { background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 15px; border: 2px solid #f1c40f; min-width: 220px; }
        .val { font-size: 2.8rem; color: #f1c40f; font-weight: bold; line-height: 1.1; }
        .status { font-size: 0.8rem; margin-top: 5px; height: 1.2em; }
        .btn-hold { margin-top: 15px; padding: 12px 30px; font-size: 1rem; border-radius: 50px; border: none; background: #e67e22; color: white; font-weight: bold; cursor: pointer; }
        .btn-hold.active { background: #2ecc71; }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline webkit-playsinline muted autoplay></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="ui">
        <p style="font-size: 0.8rem; margin-bottom: 10px;">右手をパーにしてカメラにかざしてください</p>
        <div class="result-box" id="box">
            <div style="font-size: 0.7rem;">推定 2D:4D比</div>
            <div id="ratio_val" class="val">--</div>
            <div id="status_text" class="status">解析中...</div>
        </div>
        <button class="btn-hold" id="hold_btn" onclick="toggleHold()">数値を固定する</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const ratioDisplay = document.getElementById('ratio_val');
        const statusDisplay = document.getElementById('status_text');
        const holdBtn = document.getElementById('hold_btn');

        let ratioHistory = [];
        const windowSize = 20;
        let isPaused = false;

        function toggleHold() {
            isPaused = !isPaused;
            holdBtn.innerText = isPaused ? "再開する" : "数値を固定する";
            holdBtn.classList.toggle('active', isPaused);
            if (!isPaused) ratioHistory = [];
        }

        function onResults(results) {
            if (isPaused) return;

            // キャンバスのサイズをビデオの解像度に合わせる（これがズレ防止の鍵）
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 鏡像反転の描画（selfieMode: true と連動）
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.setTransform(1, 0, 0, 1, 0, 0);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                // selfieMode: true の場合の座標系調整
                const getPx = (lm) => ({ x: (1 - lm.x) * canvasElement.width, y: lm.y * canvasElement.height });

                const p5 = getPx(landmarks[5]);  const p8 = getPx(landmarks[8]);
                const p13 = getPx(landmarks[13]); const p16 = getPx(landmarks[16]);

                const dist2D = Math.hypot(p8.x - p5.x, p8.y - p5.y);
                const dist4D = Math.hypot(p16.x - p13.x, p16.y - p13.y);

                if (dist4D > 0) {
                    const currentRatio = dist2D / dist4D;
                    ratioHistory.push(currentRatio);
                    if (ratioHistory.length > windowSize) ratioHistory.shift();
                    const avg = ratioHistory.reduce((a, b) => a + b) / ratioHistory.length;
                    
                    ratioDisplay.innerText = avg.toFixed(3);
                    statusDisplay.innerText = "● 計測中";
                    
                    canvasCtx.lineWidth = 10;
                    canvasCtx.lineCap = "round";
                    canvasCtx.strokeStyle = "#3498db"; 
                    canvasCtx.beginPath(); canvasCtx.moveTo(p5.x, p5.y); canvasCtx.lineTo(p8.x, p8.y); canvasCtx.stroke();
                    canvasCtx.strokeStyle = "#e74c3c";
                    canvasCtx.beginPath(); canvasCtx.moveTo(p13.x, p13.y); canvasCtx.lineTo(p16.x, p16.y); canvasCtx.stroke();
                }
            } else {
                statusDisplay.innerText = "手を検知中...";
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7, selfieMode: true });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
